<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WSR Slide Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="index.css">
  </head>
  <body class="bg-gray-50 text-gray-800">
    <div class="max-w-5xl mx-auto p-6">
      <header class="mb-6">
        <h1 class="text-3xl font-semibold">WSR Slide Creator</h1>
        <p class="text-sm text-gray-500">Create management-ready slides from sprint data</p>
      </header>

      <section class="mb-4 bg-white p-4 rounded shadow">
        <label class="block text-sm font-medium text-gray-700 mb-2">Select Team</label>
        <select id="teamSelect" class="w-full rounded border-gray-300 p-2">
          <option value="Mohun Bagan">Mohun Bagan</option>
        </select>
      </section>

      <main id="appContent" class="hidden">
        <div class="mb-6 bg-white p-4 rounded shadow">
          <h2 class="text-xl font-medium mb-3">Decision / Risk / Issues</h2>
          <div class="overflow-x-auto">
            <table class="w-full table-auto border-collapse">
              <thead>
                <tr class="bg-gray-100">
                  <th class="border px-3 py-2 text-left">Category</th>
                  <th class="border px-3 py-2 text-left">Title</th>
                  <th class="border px-3 py-2 text-left">Owner</th>
                  <th class="border px-3 py-2 text-left">Mitigation Plan</th>
                </tr>
              </thead>
              <tbody id="driTableBody">
                <!-- rows inserted by JS -->
              </tbody>
            </table>
          </div>
        </div>

        <div class="mb-6 bg-white p-4 rounded shadow">
          <h2 class="text-xl font-medium mb-3">Team Members</h2>
          <div class="overflow-x-auto">
            <table class="w-full table-auto border-collapse" id="membersTable">
              <thead>
                <tr class="bg-gray-100">
                  <th class="border px-3 py-2">Select</th>
                  <th class="border px-3 py-2 text-left">Name</th>
                  <th class="border px-3 py-2">Estimated Hours</th>
                  <th class="border px-3 py-2">Story Points</th>
                  <th class="border px-3 py-2">Leave Days</th>
                  <th class="border px-3 py-2">Leave Dates</th>
                  <th class="border px-3 py-2">Available Hours</th>
                </tr>
              </thead>
              <tbody id="membersTableBody">
                <!-- members injected by JS -->
              </tbody>
            </table>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="text-sm text-gray-600">Selected Team: <span id="selectedTeam" class="font-semibold"></span></div>
          <div class="space-x-3">
            <button id="generateBtn" class="bg-blue-600 text-white px-4 py-2 rounded shadow">Generate Slide</button>
            <button id="resetBtn" class="bg-gray-200 text-gray-800 px-4 py-2 rounded">Reset</button>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="api.js"></script>
  </body>
</html>
